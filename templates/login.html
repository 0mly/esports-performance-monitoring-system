<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Login</title>

    <style>

        /* PAGE */

        body {
            margin: 0;
            height: 100vh;

            display: flex;
            justify-content: center;
            align-items: center;

            background-color: #f4f4f4;

            font-family: Arial, sans-serif;
        }


        /* LOGIN BOX */

        .login-box {
            width: 320px;

            background: white;

            padding: 30px;

            border-radius: 12px;

            box-shadow: 0 6px 18px rgba(229, 57, 53, 0.15);

            text-align: center;
        }


        /* TITLE */

        h2 {
            margin-bottom: 25px;
        }


        /* INPUTS */

        input {
            width: 100%;

            padding: 12px;

            margin-bottom: 15px;

            border: 1px solid #ccc;
            border-radius: 6px;

            box-sizing: border-box;

            font-size: 15px;
        }


        /* BUTTON */

        button {
            width: 100%;
            padding: 12px;
            background-color: #E53935;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 15px;
            font-weight: bold;
        }

        button:hover {
            background-color: #C62828;
        }


        /* ERROR MESSAGE */

        .error {
            color: red;

            margin-bottom: 15px;

            font-size: 14px;
        }

    </style>
</head>

<body>

    <div class="login-box">

        <h2>Esports Performance Monitoring System</h2>
        <p>Please sign in</p>

        {% if error %}
            <p class="error">{{ error }}</p>
        {% endif %}

        <form method="POST">

            <input
                type="text"
                name="username"
                placeholder="Username"
                required
            >

            <input
                type="password"
                name="password"
                placeholder="Password"
                required
            >

            <button type="submit">
                Login
            </button>

        </form>

    </div>

</body>

</html>
