<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Esports Performance Monitoring System</title>

    <style>

        /* PAGE */

        body {
            margin: 0;

            background-color: #f4f4f4;

            font-family: Arial, sans-serif;
        }


        /* TOP BAR */

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 30px;
            background-color: #111;
            color: white;
        }

        .top-bar h2 {
            margin: 0;
        }


        /* LOGOUT BUTTON */

        .logout-btn {
            text-decoration: none;

            background-color: #e74c3c;
            color: white;

            padding: 10px 15px;

            border-radius: 6px;

            font-weight: bold;
        }

        .logout-btn:hover {
            background-color: #c0392b;
        }


        /* MAIN CONTENT */

        .container {
            text-align: center;
            padding: 25px;
        }


        /* PLAYER COUNT */

        .player-count {
            margin-bottom: 25px;
        }


        /* ADD PLAYER FORM */

        .add-form {
            margin-bottom: 30px;
        }

        .add-form input,
        .add-form select {
            padding: 10px;

            margin: 5px;

            border: 1px solid #ccc;
            border-radius: 6px;

            font-size: 14px;
        }

        .add-form button {
            padding: 10px 16px;
            border: none;
            border-radius: 6px;
            background-color: #E53935;
            color: white;
            cursor: pointer;
            font-weight: bold;
        }

        .add-form button:hover {
            background-color: #C62828;
        }


        /* PLAYER CARD */

        .player-row {
            max-width: 420px;
            width: 100%;
            margin: 12px auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 12px rgba(229,57,53,0.15);
            transition: 0.2s ease;
        }

        .player-row:hover {
            transform: translateY(-2px);

            box-shadow: 0 6px 18px rgba(229,57,53,0.18);
        }


        /* PLAYER LINK */

        .player-link {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 18px;
            gap: 12px;
            text-decoration: none;
            color: black;
            border-bottom: 1px solid #eee;
        }

        .player-link:hover {
            background-color: #fff5f5;
        }


        /* PLAYER INFO */

        .avatar {
            font-size: 22px;
        }

        .avatar-img {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #e53935;
        }

        .player-info {
            flex: 1;

            margin-left: 12px;

            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }

        .name {
            font-size: 18px;
            font-weight: bold;

            margin-bottom: 3px;
        }

        .role {
            font-size: 14px;
            color: #777;
        }

        .arrow {
            font-size: 18px;
            font-weight: bold;
        }


        /* DELETE FORM */

        .delete-form {
            padding: 12px;
        }

        .delete-btn {
            width: 100%;

            padding: 10px;

            border: none;
            border-radius: 6px;

            background-color: #e74c3c;
            color: white;

            cursor: pointer;

            font-weight: bold;
        }

        .delete-btn:hover {
            background-color: #c0392b;
        }

    </style>

</head>

<body>

    <!-- TOP BAR -->

    <div class="top-bar">

        <h2>
             Esports Performance Monitoring System
        </h2>

        <a
            href="/logout"
            class="logout-btn"
        >
            Logout
        </a>

    </div>


    <!-- MAIN CONTENT -->

    <div class="container">

        <!-- PLAYER COUNT -->

        <h3 class="player-count">
            Total Players: {{ players|length }}
        </h3>


        <!-- ADD PLAYER -->

        <form
            method="POST"
            action="/add"
            class="add-form"
        >

            <input
                type="text"
                name="first_name"
                placeholder="First Name"
                required
            >

            <input
                type="text"
                name="last_name"
                placeholder="Last Name"
                required
            >

            <select
                name="role"
                required
            >

                <option value="">
                    Select Role
                </option>

                <option value="player">
                    Player
                </option>

                <option value="coach">
                    Coach
                </option>

            </select>

            <button type="submit">
                Add Player
            </button>

        </form>


        <!-- PLAYER LIST -->

        {% for player in players %}

        <div class="player-row">

            <!-- PLAYER LINK -->

            <a
                href="/player/{{ player.id }}"
                class="player-link"
            >

                {% if player.image %}
                    <img
                        src="{{ url_for('static', filename='uploads/' + player.image) }}"
                        alt="Avatar"
                        class="avatar-img"
                    >
                {% else %}
                    <span class="avatar">
                        👤
                    </span>
                {% endif %}
            

                <div class="player-info">

                    <div class="name">
                        {{ player.name }}
                    </div>

                    <div class="role">
                        {{ player.role | capitalize }}
                    </div>

                </div>

                <span class="arrow">
                    →
                </span>

            </a>


            <!-- DELETE PLAYER -->

            <form
                method="POST"
                action="/delete/{{ player.id }}"
                class="delete-form"
            >

                <button
                    type="submit"
                    class="delete-btn"
                    onclick="return confirm('Delete this player?');"
                >
                    Delete
                </button>

            </form>

        </div>

        {% endfor %}

    </div>

</body>

</html>
